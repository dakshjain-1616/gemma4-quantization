  <line x1="30" y1="152" x2="650" y2="152" stroke="#21262d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="22" y="156" text-anchor="end" font-family="monospace" font-size="9" fill="#8b949e">12GB</text>
  <text x="22" y="204" text-anchor="end" font-family="monospace" font-size="9" fill="#8b949e">0</text>
