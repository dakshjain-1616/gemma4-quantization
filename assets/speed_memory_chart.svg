  <rect x="258.5" y="306" width="150.5" height="46" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="333.8" y="337.9" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#a78bfa">49.9</text>
  <text x="333.8" y="344.0" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">INT8 ms</text>
  <rect x="421.0" y="306" width="150.5" height="46" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="496.2" y="337.9" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#f85149">49.0</text>
  <text x="496.2" y="344.0" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">INT4 ms</text>
  <rect x="583.5" y="306" width="150.5" height="46" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="658.8" y="337.9" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#ffa198">50.6</text>
  <text x="658.8" y="344.0" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b949e">1-bit ms</text>
  <text x="380" y="388" text-anchor="middle" font-family="monospace" font-size="8" fill="#484f58">Latency is identical across all levels — simulated quant holds weights in BF16, no integer arithmetic. Real INT8 kernels (bitsandbytes/GPTQ) yield ~1.5–2× throughput gain.</text>
