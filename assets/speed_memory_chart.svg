  <text x="330" y="248" font-family="monospace" font-size="11" font-weight="bold" fill="#8b5cf6">67.2ms</text>
  <text x="440" y="248" font-family="monospace" font-size="11" font-weight="bold" fill="#f87171">68.9ms</text>
