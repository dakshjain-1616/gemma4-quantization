  <line x1="30" y1="200" x2="650" y2="200" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="150.8" width="50" height="49.2" rx="3" fill="#34d399" opacity="0.8"/><text x="65" y="145.8" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">10.2GB</text><text x="65" y="218" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#34d399">FP16</text><rect x="190" y="101.6" width="50" height="98.4" rx="3" fill="#8b5cf6" opacity="0.8"/><text x="215" y="96.6" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b5cf6">20.5GB</text><text x="215" y="218" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8b5cf6">INT8</text><rect x="340" y="101.5" width="50" height="98.5" rx="3" fill="#f87171" opacity="0.8"/><text x="365" y="96.5" text-anchor="middle" font-family="monospace" font-size="10" fill="#f87171">20.5GB</text><text x="365" y="218" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#f87171">INT4</text><rect x="490" y="101.5" width="50" height="98.5" rx="3" fill="#fca5a5" opacity="0.8"/><text x="515" y="96.5" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5">20.5GB</text><text x="515" y="218" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fca5a5">1-bit</text>
