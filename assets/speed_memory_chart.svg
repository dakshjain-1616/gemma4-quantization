  <text x="90" y="264.0" font-family="monospace" font-size="8" fill="#484f58">Theoretical: BF16=10.25 GB, INT8=5.12 GB, INT4=2.56 GB, 1-bit=1.01 GB. Simulated quant holds weights in BF16 — no runtime savings.</text>
  <line x1="90" y1="276" x2="740" y2="276" stroke="#30363d" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>
